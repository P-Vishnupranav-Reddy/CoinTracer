name: CI-CD Pipeline

on:
  push:
    branches: 
      - '**'  # Run on all branches
  pull_request:
    branches: 
      - '**'  # Run on all pull requests

jobs:
  lint-all-services:
    name: Lint All Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: npm ci --workspaces

      - name: Run Global Lint Check
        id: lint
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          echo "lint_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Parse Lint Results
        id: parse
        run: |
          SCORE=$(grep -oP "Average Score: \K[\d.]+" lint-output.txt || echo "0")
          ERRORS=$(grep -oP "Total Errors: \K\d+" lint-output.txt || echo "0")
          WARNINGS=$(grep -oP "Total Warnings: \K\d+" lint-output.txt || echo "0")
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Create Lint Summary
        run: |
          echo "## Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SCORE="${{ steps.parse.outputs.score }}"
          ERRORS="${{ steps.parse.outputs.errors }}"
          WARNINGS="${{ steps.parse.outputs.warnings }}"
          
          # Convert score to integer for comparison (multiply by 10)
          SCORE_INT=$(echo "$SCORE * 10" | bc | cut -d. -f1)
          
          if [ "$SCORE_INT" -ge 100 ]; then
            BADGE="[PERFECT]"
            STATUS="PERFECT"
          elif [ "$SCORE_INT" -ge 90 ]; then
            BADGE="[EXCELLENT]"
            STATUS="EXCELLENT"
          elif [ "$SCORE_INT" -ge 70 ]; then
            BADGE="[GOOD]"
            STATUS="GOOD"
          elif [ "$SCORE_INT" -ge 50 ]; then
            BADGE="[FAIR]"
            STATUS="FAIR"
          else
            BADGE="[NEEDS IMPROVEMENT]"
            STATUS="NEEDS IMPROVEMENT"
          fi
          
          echo "### Overall Score: $BADGE $SCORE/10 - $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $ERRORS | $([ $ERRORS -eq 0 ] && echo 'PASS' || echo 'FAIL') |" >> $GITHUB_STEP_SUMMARY
          echo "| Warnings | $WARNINGS | $([ $WARNINGS -eq 0 ] && echo 'PASS' || echo 'WARN') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>View Detailed Lint Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat lint-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Save Lint Report to reports directory
        if: always()
        run: |
          mkdir -p reports/lint
          cp lint-output.txt reports/lint/lint-report.txt
          echo "Lint report saved to reports/lint/lint-report.txt"

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: |
            lint-output.txt
            reports/lint/
          retention-days: 30

      - name: Comment PR with Lint Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const score = '${{ steps.parse.outputs.score }}';
            const errors = '${{ steps.parse.outputs.errors }}';
            const warnings = '${{ steps.parse.outputs.warnings }}';
            
            let badge = '[NEEDS IMPROVEMENT]';
            let status = 'NEEDS IMPROVEMENT';
            if (parseFloat(score) === 10) {
              badge = '[PERFECT]';
              status = 'PERFECT';
            } else if (parseFloat(score) >= 9) {
              badge = '[EXCELLENT]';
              status = 'EXCELLENT';
            } else if (parseFloat(score) >= 7) {
              badge = '[GOOD]';
              status = 'GOOD';
            } else if (parseFloat(score) >= 5) {
              badge = '[FAIR]';
              status = 'FAIR';
            }
            
            const lintOutput = fs.readFileSync('lint-output.txt', 'utf8');
            
            const comment = `## Lint Results
            
            ### Overall Score: ${badge} ${score}/10 - ${status}
            
            | Metric | Count | Status |
            |--------|-------|---------|
            | Errors | ${errors} | ${errors === '0' ? 'PASS' : 'FAIL'} |
            | Warnings | ${warnings} | ${warnings === '0' ? 'PASS' : 'WARN'} |
            
            <details>
            <summary>View Detailed Lint Output</summary>
            
            \`\`\`
            ${lintOutput}
            \`\`\`
            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if score below threshold
        if: steps.parse.outputs.score < 7.5
        run: |
          echo "FAIL: Linting score ${{ steps.parse.outputs.score }}/10 is below threshold of 7.5/10"
          echo "Errors: ${{ steps.parse.outputs.errors }}, Warnings: ${{ steps.parse.outputs.warnings }}"
          exit 1

  user-service:
    name: user-service
    needs: lint-all-services
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        ports:
          - 5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dacpt
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install
          echo "Dependencies installed successfully"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for database
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p ${{ job.services.postgres.ports['5432'] }} -U postgres; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Prepare database schema
        env:
          PGPASSWORD: postgres
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          echo "Loading database schema..."
          psql -h localhost -U postgres -d dacpt -f db/schema.sql
          if [ -f db/seed.sql ]; then
            echo "Loading seed data..."
            psql -h localhost -U postgres -d dacpt -f db/seed.sql
          fi
          echo "Database schema loaded successfully"

      - name: Run tests
        env:
          PGHOST: localhost
          PGPORT: ${{ job.services.postgres.ports['5432'] }}
          PGDATABASE: dacpt
          PGUSER: postgres
          PGPASSWORD: postgres
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key
        run: |
          echo "Running tests for user-service..."
          npm test -w user-service -- --coverage --passWithNoTests
          echo "OK: Tests completed for user-service"

      - name: Generate test summary
        continue-on-error: true
        working-directory: user-service
        run: |
          echo "### Test Results: user-service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          TEST_FILES=$(find tests -name "*.test.js" 2>/dev/null | wc -l || echo "0")
          echo "- **Test Files**: $TEST_FILES" >> $GITHUB_STEP_SUMMARY
          
          if [ "$TEST_FILES" -gt 0 ]; then
            echo "- **Test Files Executed**:" >> $GITHUB_STEP_SUMMARY
            find tests -name "*.test.js" 2>/dev/null | sed 's/^/  - /' >> $GITHUB_STEP_SUMMARY || true
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Save test results and coverage to reports directory
        if: always()
        run: |
          mkdir -p reports/user-service
          if [ -d "user-service/coverage" ]; then
            cp -r user-service/coverage reports/user-service/
          fi
          echo "Reports saved to reports/user-service/"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: user-service-coverage
          path: |
            user-service/coverage
            reports/user-service/
          if-no-files-found: warn

