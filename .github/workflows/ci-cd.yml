  frontend:
    name: frontend
    needs: lint-all-services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

      - name: Test frontend
        working-directory: frontend
        run: |
          if node -e "const p=require('./package.json');process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm test -- --coverage --watch=false
          else
            echo "No frontend test script defined; skipping tests and coverage."
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Generate test summary
        working-directory: frontend
        continue-on-error: true
        run: |
          echo "### Test Results: frontend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Save frontend build to reports directory
        if: always()
        run: |
          mkdir -p reports/frontend
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist reports/frontend/build
          fi
          if [ -d "frontend/coverage" ]; then
            cp -r frontend/coverage reports/frontend/
          fi
          echo "Frontend artifacts saved to reports/frontend/"

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/dist
            reports/frontend/
          if-no-files-found: warn

